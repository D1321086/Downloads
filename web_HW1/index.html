<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統聯客運 Ubus - 系統等候中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <button id="theme-toggle" class="theme-toggle">🌙 進入夜間模式</button>

    <div class="glass-container" id="glass-card">
        <div class="header">
            <h1>統聯客運 <span>Ubus</span></h1>
        </div>
        
        <div class="message">
            <h2>系統目前較為繁忙，請稍候</h2>
            <p id="dynamic-text">正在為您建立安全連線...</p>
        </div>

        <div class="animation-area">
            <div class="bus" id="interactive-bus">
                🚌
                <span class="honk" id="honk-text"></span>
            </div>
            <div class="road"></div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="status">
            <p>預計等候時間： <span id="countdown">30</span> 秒</p>
        </div>

        <button id="retry-btn" class="retry-btn">嘗試手動重新連線</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
